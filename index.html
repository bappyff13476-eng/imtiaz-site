<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Imtiaz Secure Portal</title>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #111, #000); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: rgba(0, 255, 204, 0.05); padding: 40px; border: 1px solid #00ffcc; border-radius: 20px; box-shadow: 0 0 50px rgba(0, 255, 204, 0.2); text-align: center; width: 320px; }
        .logo-khan { font-size: 35px; font-weight: 900; color: #fff; text-shadow: 0 0 15px #00ffcc; margin-bottom: 25px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: transparent; border: 1px solid #444; color: white; border-radius: 8px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #00ffcc; border: none; color: #000; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        .toggle-text { margin-top: 15px; font-size: 13px; color: #888; cursor: pointer; }
        
        #dashboard { display: none; padding: 50px; text-align: center; }
        .ai-status { margin-top: 30px; padding: 20px; border: 1px dashed #00ffcc; display: inline-block; background: rgba(0,0,0,0.5); border-radius: 10px; }
    </style>
</head>
<body>

<div class="overlay" id="authScreen">
    <div class="login-card">
        <div class="logo-khan">KHAN PRO</div>
        <h3 id="authTitle">Login to System</h3>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()">ENTER SYSTEM</button>
        <div class="toggle-text" id="toggleLink" onclick="toggleAuth()">Don't have an account? Create one</div>
    </div>
</div>

<div id="dashboard">
    <div class="logo-khan">WELCOME BOSS</div>
    <div class="ai-status">
        <h3>CYBER-IMTIAZ AI ACTIVE</h3>
        <input type="text" id="aiInput" placeholder="Order me..." style="width: 250px;">
        <button class="btn" style="width: auto;" onclick="runAI()">EXECUTE</button>
        <p id="aiOutput" style="color: #fff; font-weight: bold; margin-top: 15px;">System Ready...</p>
    </div>
</div>

<iframe src="https://www.youtube.com/embed/5PSvX_0kMpw?autoplay=1&mute=0" style="display:none"></iframe>

<script>
    let isLogin = true;
    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? "Login to System" : "Create Account";
        document.getElementById('toggleLink').innerText = isLogin ? "Go back to Login" : "Don't have an account? Create one";
    }
    function handleAuth() {
        const user = document.getElementById('user').value;
        if(user !== "") {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } else { alert("Enter a name first!"); }
    }
    function runAI() {
        const msg = document.getElementById('aiInput').value;
        const out = document.getElementById('aiOutput');
        out.innerText = "Cyber-Imtiaz: Analyzing '" + msg + "'... Action Successful!";
    }
</script>

</body>
</html>
